<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .card {
    width: 1200px; height: 675px;
    background: linear-gradient(145deg, #1a0d2e 0%, #150a28 40%, #1d1035 100%);
    border-radius: 24px;
    padding: 72px 80px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(168,85,247,0.14) 0%, transparent 70%);
    border-radius: 50%;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -150px; left: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(192,132,252,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .top { position: relative; z-index: 1; }
  .badge {
    display: inline-block;
    background: rgba(168,85,247,0.15);
    border: 1px solid rgba(168,85,247,0.3);
    color: #c084fc;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 100px;
    margin-bottom: 32px;
  }
  .title {
    font-size: 52px;
    font-weight: 700;
    color: #f1f5f9;
    line-height: 1.15;
    margin-bottom: 20px;
    max-width: 750px;
  }
  .title span { color: #c084fc; }
  .desc {
    font-size: 20px;
    color: #94a3b8;
    line-height: 1.6;
    max-width: 680px;
  }
  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .logo { font-size: 22px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.5px; }
  .logo span { color: #c084fc; }
  .url { font-size: 16px; color: #64748b; font-weight: 500; }
  .frame-mock {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-55%);
    z-index: 0;
    opacity: 0.1;
  }
  .frame-box {
    width: 280px;
    border: 2px solid #c084fc;
    border-radius: 16px;
    padding: 20px;
  }
  .frame-img {
    width: 100%;
    height: 120px;
    background: rgba(168,85,247,0.2);
    border-radius: 8px;
    margin-bottom: 14px;
  }
  .frame-title {
    font-size: 18px;
    font-weight: 600;
    color: #c084fc;
    margin-bottom: 8px;
  }
  .frame-desc {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .frame-btn {
    width: 100%;
    padding: 10px;
    background: rgba(168,85,247,0.3);
    border: 1px solid rgba(168,85,247,0.4);
    border-radius: 8px;
    color: #c084fc;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
  }
  .dots {
    position: absolute;
    top: 40px; right: 40px;
    display: grid;
    grid-template-columns: repeat(5, 8px);
    gap: 12px;
    opacity: 0.15;
    z-index: 0;
  }
  .dots div { width: 8px; height: 8px; background: #c084fc; border-radius: 50%; }
</style>
</head>
<body>
<div class="card">
  <div class="dots">
    <div></div><div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div><div></div>
  </div>
  <div class="frame-mock">
    <div class="frame-box">
      <div class="frame-img"></div>
      <div class="frame-title">ZentrFi</div>
      <div class="frame-desc">Search flights & book with crypto</div>
      <div class="frame-btn">Search Flights</div>
    </div>
  </div>
  <div class="top">
    <div class="badge">New Feature</div>
    <div class="title">Farcaster <span>Frames v2</span></div>
    <div class="desc">Share a ZentrFi link on Farcaster and it renders as a rich interactive card. Your followers can browse flight deals directly from their feed.</div>
  </div>
  <div class="bottom">
    <div class="logo">Zentr<span>Fi</span></div>
    <div class="url">zentrfi.com</div>
  </div>
</div>
</body>
</html>
