<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .card {
    width: 1200px; height: 675px;
    background: linear-gradient(145deg, #0d1a17 0%, #0a1a1a 40%, #0f1f1b 100%);
    border-radius: 24px;
    padding: 72px 80px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(16,185,129,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -150px; left: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(52,211,153,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .top { position: relative; z-index: 1; }
  .badge {
    display: inline-block;
    background: rgba(16,185,129,0.15);
    border: 1px solid rgba(16,185,129,0.3);
    color: #34d399;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 100px;
    margin-bottom: 32px;
  }
  .title {
    font-size: 52px;
    font-weight: 700;
    color: #f1f5f9;
    line-height: 1.15;
    margin-bottom: 20px;
    max-width: 750px;
  }
  .title span { color: #34d399; }
  .desc {
    font-size: 20px;
    color: #94a3b8;
    line-height: 1.6;
    max-width: 680px;
  }
  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .logo { font-size: 22px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.5px; }
  .logo span { color: #34d399; }
  .url { font-size: 16px; color: #64748b; font-weight: 500; }
  .transform-demo {
    position: absolute;
    right: 70px;
    top: 50%;
    transform: translateY(-55%);
    z-index: 0;
    text-align: right;
    opacity: 0.1;
  }
  .addr {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 22px;
    color: #64748b;
    text-decoration: line-through;
    margin-bottom: 16px;
  }
  .name {
    font-size: 56px;
    font-weight: 700;
    color: #34d399;
  }
  .dots {
    position: absolute;
    top: 40px; right: 40px;
    display: grid;
    grid-template-columns: repeat(5, 8px);
    gap: 12px;
    opacity: 0.15;
    z-index: 0;
  }
  .dots div { width: 8px; height: 8px; background: #34d399; border-radius: 50%; }
</style>
</head>
<body>
<div class="card">
  <div class="dots">
    <div></div><div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div><div></div>
  </div>
  <div class="transform-demo">
    <div class="addr">0x705e...d51C</div>
    <div class="name">alice.eth</div>
  </div>
  <div class="top">
    <div class="badge">New Feature</div>
    <div class="title">ENS & Basename <span>Resolution</span></div>
    <div class="desc">Human-readable wallet names across the entire dashboard. If you own an ENS or Basename, that's what you'll see everywhere — not a raw hex address.</div>
  </div>
  <div class="bottom">
    <div class="logo">Zentr<span>Fi</span></div>
    <div class="url">zentrfi.com</div>
  </div>
</div>
</body>
</html>
